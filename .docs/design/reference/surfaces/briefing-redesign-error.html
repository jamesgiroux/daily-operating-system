<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daily Briefing — Error · DailyOS Reference</title>

  <link rel="stylesheet" href="../_shared/fonts.css">
  <link rel="stylesheet" href="../_shared/styles/design-tokens.css">
  <link rel="stylesheet" href="../_shared/styles/AtmosphereLayer.module.css">
  <link rel="stylesheet" href="../_shared/styles/FolioBar.module.css">
  <link rel="stylesheet" href="../_shared/styles/FloatingNavIsland.module.css">
  <link rel="stylesheet" href="../_shared/styles/MagazinePageLayout.module.css">
  <link rel="stylesheet" href="../_shared/styles/editorial-briefing.module.css">
  <link rel="stylesheet" href="../_shared/styles/ui-button.css">
  <link rel="stylesheet" href="../_shared/chrome.css">
  <link rel="stylesheet" href="../_shared/inspector.css">

  <style>
    /* Provisional error-state styling. Final lives in BriefingErrorState pattern (W5). */
    .briefing-error {
      max-width: 640px;
      margin: 0 auto;
      padding: var(--space-5xl) 0;
      text-align: center;
    }
    .briefing-error-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-spice-terracotta);
      margin: 0;
    }
    .briefing-error-headline {
      margin-top: var(--space-md);
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--color-text-primary);
    }
    .briefing-error-detail {
      margin-top: var(--space-lg);
      font-family: var(--font-serif);
      font-size: 17px;
      font-style: italic;
      font-weight: 300;
      line-height: 1.5;
      color: var(--color-text-secondary);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .briefing-error-actions {
      margin-top: var(--space-2xl);
      display: flex;
      gap: var(--space-md);
      justify-content: center;
    }
    .briefing-error-meta {
      margin-top: var(--space-xl);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body
  data-folio-label="Daily Briefing"
  data-folio-crumbs="Reference > Surfaces > Daily Briefing > Error"
  data-tint="turmeric"
  data-active-page="today"
  data-nav-base=".">

<div class="MagazinePageLayout_magazinePage">
<main class="MagazinePageLayout_pageContainer">

<div
  data-ds-tier="surface"
  data-ds-name="DailyBriefingRedesign"
  data-ds-spec="surfaces/DailyBriefingRedesign.md"
  data-ds-state="error"
>
  <section class="briefing-error">
    <p class="briefing-error-eyebrow">Briefing unavailable</p>
    <h1 class="briefing-error-headline">We couldn't load your briefing.</h1>
    <p class="briefing-error-detail">A signal source isn't responding. Your day is still on the calendar — we just can't shape it into a briefing right now.</p>
    <div class="briefing-error-actions">
      <button type="button" class="ui-button ui-button-default ui-button-default-size">Try again</button>
      <a class="ui-button ui-button-secondary ui-button-default-size" href="settings.html">Diagnostics</a>
    </div>
    <p class="briefing-error-meta">code: dependency_failed · service: predictions</p>
  </section>
</div>

</main>
</div>

<script src="../_shared/chrome.js"></script>
<script src="../_shared/inspector.js"></script>
</body>
</html>
