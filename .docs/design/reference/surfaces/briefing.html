<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daily Briefing · DailyOS Reference</title>

  <!-- Fonts FIRST so the rest of the cascade has them -->
  <link rel="stylesheet" href="../_shared/fonts.css">
  <link rel="stylesheet" href="../_shared/styles/design-tokens.css">

  <!-- Chrome modules — injected by chrome.js from body data attributes -->
  <link rel="stylesheet" href="../_shared/styles/AtmosphereLayer.module.css">
  <link rel="stylesheet" href="../_shared/styles/FolioBar.module.css">
  <link rel="stylesheet" href="../_shared/styles/FloatingNavIsland.module.css">
  <link rel="stylesheet" href="../_shared/styles/MagazinePageLayout.module.css">

  <!-- Surface-specific modules used by DailyBriefing.tsx and rendered children -->
  <link rel="stylesheet" href="../_shared/styles/editorial-briefing.module.css">
  <link rel="stylesheet" href="../_shared/styles/DailyBriefing.module.css">
  <link rel="stylesheet" href="../_shared/styles/MeetingCard.module.css">
  <link rel="stylesheet" href="../_shared/styles/HealthBadge.module.css">
  <link rel="stylesheet" href="../_shared/styles/Pill.module.css">
  <link rel="stylesheet" href="../_shared/styles/ui-button.css">
  <link rel="stylesheet" href="../_shared/styles/tailwind-shims.css">

  <!-- Reference-only chrome (chrome toggle, baseline reset) -->
  <link rel="stylesheet" href="../_shared/chrome.css">
  <link rel="stylesheet" href="../_shared/inspector.css">
</head>
<body
  data-folio-label="Daily Briefing"
  data-folio-crumbs="Reference > Surfaces > Daily Briefing"
  data-tint="turmeric"
  data-active-page="today"
  data-nav-base="."
  data-folio-date="MONDAY, MAY 4, 2026"
  data-folio-readiness="0/1 briefings ready,sage|1 overdue,terracotta">

<!-- MagazinePageLayout shell — mirrors src/components/layout/MagazinePageLayout.tsx.
     Folio bar, atmosphere, and floating nav are injected by chrome.js. -->
<div class="MagazinePageLayout_magazinePage">
<main class="MagazinePageLayout_pageContainer">

<div
  data-ds-tier="surface"
  data-ds-name="DailyBriefing"
  data-ds-spec="surfaces/DailyBriefing.md"
>
  <!-- Day frame: data.overview.summary absent, active meetings present. -->
  <section class="editorial-briefing_hero">
    <h1 class="editorial-briefing_heroHeadline">Your day is ready.</h1>
  </section>

  <!-- Schedule: one realistic rest state, all meetings are past, so no expansion panels render. -->
  <section class="editorial-briefing_scheduleSection">
    <div class="editorial-briefing_marginGrid">
      <div class="editorial-briefing_marginLabel">
        Schedule
        <span class="editorial-briefing_marginLabelCount">2 meetings</span>
      </div>
      <div class="editorial-briefing_marginContent">
        <div class="editorial-briefing_sectionRule"></div>

        <div class="editorial-briefing_scheduleRows">
          <div>
            <div class="MeetingCard_card MeetingCard_accentCustomer MeetingCard_past MeetingCard_clickable MeetingCard_pastNavigate editorial-briefing_briefingCardOverride">
              <div class="MeetingCard_time">
                9:00 AM
                <span class="MeetingCard_duration">45m</span>
              </div>
              <div class="MeetingCard_content">
                <div class="MeetingCard_titleRow">
                  <span class="MeetingCard_title">Acme Corp renewal checkpoint</span>
                  <span class="MeetingCard_pastArrow">&rarr;</span>
                </div>
                <div class="MeetingCard_subtitle">Acme Corp &middot; 4 attendees</div>
                <div class="editorial-briefing_capturedSummary">1 action captured</div>
              </div>
            </div>
            <div class="DailyBriefing_healthBadgeRow">
              <span class="HealthBadge_badge" title="Insufficient data for health score">
                <span class="HealthBadge_dot HealthBadge_dotCompact HealthBadge_dotMuted"></span>
                <span class="HealthBadge_score HealthBadge_scoreCompact HealthBadge_scoreMuted">N/A</span>
              </span>
            </div>
          </div>

          <div>
            <div class="MeetingCard_card MeetingCard_accentInternal MeetingCard_past MeetingCard_clickable MeetingCard_pastNavigate editorial-briefing_briefingCardOverride">
              <div class="MeetingCard_time">
                10:30 AM
                <span class="MeetingCard_duration">30m</span>
              </div>
              <div class="MeetingCard_content">
                <div class="MeetingCard_titleRow">
                  <span class="MeetingCard_title">Customer desk standup</span>
                  <span class="MeetingCard_pastArrow">&rarr;</span>
                </div>
                <div class="MeetingCard_subtitle">Internal &middot; 5 attendees</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Attention: fallback raw pending action path, no lifecycle or email intelligence rendered. -->
  <section class="editorial-briefing_prioritiesSection">
    <div class="editorial-briefing_marginGrid">
      <div class="editorial-briefing_marginLabel">Attention</div>
      <div class="editorial-briefing_marginContent">
        <div class="editorial-briefing_sectionRule"></div>

        <div class="DailyBriefing_actionsGroupFlush">
          <div class="editorial-briefing_priorityGroupLabel editorial-briefing_priorityGroupLabelOverdue">
            Actions
          </div>
          <div class="editorial-briefing_priorityItems">
            <div class="editorial-briefing_priorityItem editorial-briefing_priorityItemOverdue editorial-briefing_priorityItemAccount">
              <button class="editorial-briefing_priorityCheck editorial-briefing_priorityCheckOverdue"></button>
              <div class="editorial-briefing_priorityContent">
                <a href="actions.html" class="editorial-briefing_priorityTitle DailyBriefing_linkNoDecoration">
                  Send Acme Corp final MSA redlines to Jen Park
                </a>
                <div class="editorial-briefing_priorityContext">
                  2 days overdue &middot; Acme Corp
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Conditional correction dialog text retained for reference-fidelity text audit: Fix lifecycle change. No stage. -->

  <!-- FinisMarker: enrichedAt is undefined, so no timestamp renders. -->
  <div class="finis-marker">
    <div class="finis-marker-marks">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 433 407" width="18" height="18" aria-hidden="true"><path d="M159 407 161 292 57 355 0 259 102 204 0 148 57 52 161 115 159 0H273L271 115L375 52L433 148L331 204L433 259L375 355L271 292L273 407Z" fill="currentColor"/></svg>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 433 407" width="18" height="18" aria-hidden="true"><path d="M159 407 161 292 57 355 0 259 102 204 0 148 57 52 161 115 159 0H273L271 115L375 52L433 148L331 204L433 259L375 355L271 292L273 407Z" fill="currentColor"/></svg>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 433 407" width="18" height="18" aria-hidden="true"><path d="M159 407 161 292 57 355 0 259 102 204 0 148 57 52 161 115 159 0H273L271 115L375 52L433 148L331 204L433 259L375 355L271 292L273 407Z" fill="currentColor"/></svg>
    </div>
  </div>
</div>

</main>
</div>

<script src="../_shared/chrome.js"></script>
<script src="../_shared/inspector.js"></script>
</body>
</html>
