<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Onboarding · About You — DailyOS Reference</title>

<link rel="stylesheet" href="../../_shared/fonts.css">
<link rel="stylesheet" href="../../_shared/styles/design-tokens.css">
<link rel="stylesheet" href="../../_shared/styles/AtmosphereLayer.module.css">
<link rel="stylesheet" href="../../_shared/styles/FolioBar.module.css">
<link rel="stylesheet" href="../../_shared/styles/FloatingNavIsland.module.css">
<link rel="stylesheet" href="../../_shared/styles/ChapterHeading.module.css">
<link rel="stylesheet" href="../../_shared/styles/onboarding.module.css">
<link rel="stylesheet" href="../../_shared/styles/ui-button.css">
<link rel="stylesheet" href="../../_shared/styles/tailwind-shims.css">
<link rel="stylesheet" href="../../_shared/chrome.css">
<link rel="stylesheet" href="../../_shared/inspector.css">
</head>
<body
  data-folio-label="Setup"
  data-folio-crumbs="Reference > Surfaces > Onboarding > About You"
  data-tint="turmeric"
  data-active-page=""
  data-nav-mode="chapters-only"
  data-active-chapter="youcard"
  data-chapters="welcome:sparkles:Welcome|google:mail:Google|claude-code:terminal:Claude|glean:globe:Glean|youcard:user:About You|first-account:building:Account|role:briefcase:Your Role|prime:sparkles:Prime">

<div class="onboarding_wrapper">
  <div class="onboarding_contentColumn">
    <div class="onboarding_flexCol onboarding_gap24">

      <!-- ChapterHeading: title + epigraph (no feedback, primary variant) -->
      <div class="ChapterHeading_heading">
        <hr class="ChapterHeading_rule">
        <div class="ChapterHeading_titleRow">
          <h2 class="ChapterHeading_title">About you</h2>
        </div>
        <p class="ChapterHeading_epigraph">A little context helps tailor your briefings. Everything here is optional.</p>
      </div>

      <!-- Conditional Glean-prefill helper text: Pre-filled from your company directory. Edit anything that needs updating. -->

      <div class="onboarding_flexCol onboarding_gap20">
        <!-- Name -->
        <div>
          <label class="onboarding_fieldLabel">Your name</label>
          <input
            type="text"
            data-slot="input"
            placeholder="e.g. Alex Chen"
            value=""
            class="file:text-foreground placeholder:text-muted-foreground selection:bg-primary selection:text-primary-foreground dark:bg-input/30 border-input h-9 w-full min-w-0 rounded-md border bg-transparent px-3 py-1 text-base shadow-xs transition-[color,box-shadow] outline-none file:inline-flex file:h-7 file:border-0 file:bg-transparent file:text-sm file:font-medium disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive onboarding_editorialInput"
          />
        </div>

        <!-- Company -->
        <div>
          <label class="onboarding_fieldLabel">Company</label>
          <input
            type="text"
            data-slot="input"
            placeholder="e.g. Acme Inc."
            value=""
            class="file:text-foreground placeholder:text-muted-foreground selection:bg-primary selection:text-primary-foreground dark:bg-input/30 border-input h-9 w-full min-w-0 rounded-md border bg-transparent px-3 py-1 text-base shadow-xs transition-[color,box-shadow] outline-none file:inline-flex file:h-7 file:border-0 file:bg-transparent file:text-sm file:font-medium disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive onboarding_editorialInput"
          />
        </div>

        <!-- Title -->
        <div>
          <label class="onboarding_fieldLabel">Title</label>
          <input
            type="text"
            data-slot="input"
            placeholder="e.g. Customer Success Manager"
            value=""
            class="file:text-foreground placeholder:text-muted-foreground selection:bg-primary selection:text-primary-foreground dark:bg-input/30 border-input h-9 w-full min-w-0 rounded-md border bg-transparent px-3 py-1 text-base shadow-xs transition-[color,box-shadow] outline-none file:inline-flex file:h-7 file:border-0 file:bg-transparent file:text-sm file:font-medium disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive onboarding_editorialInput"
          />
        </div>

        <!-- Domains: one realistic rest-state domain prefilled from the connected Google email -->
        <div>
          <label class="onboarding_fieldLabel">Company email domains</label>
          <div class="flex gap-2">
            <input
              type="text"
              data-slot="input"
              placeholder="e.g. acme.com"
              value=""
              class="file:text-foreground placeholder:text-muted-foreground selection:bg-primary selection:text-primary-foreground dark:bg-input/30 border-input h-9 w-full min-w-0 rounded-md border bg-transparent px-3 py-1 text-base shadow-xs transition-[color,box-shadow] outline-none file:inline-flex file:h-7 file:border-0 file:bg-transparent file:text-sm file:font-medium disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive onboarding_editorialInput"
            />
            <button type="button" class="ui-button ui-button-outline ui-button-icon" data-slot="button" data-variant="outline" data-size="icon" disabled>
              <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
          </div>
          <div class="onboarding_flexWrap onboarding_mt8">
            <span class="onboarding_domainChip">
              @acme.com
              <button type="button" class="onboarding_ghostButton">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </span>
          </div>
          <p class="onboarding_helperText">
            Helps distinguish internal meetings from external ones.
          </p>
        </div>
      </div>

      <!-- Continue / Skip -->
      <div class="onboarding_flexBetween">
        <button type="button" class="onboarding_skipButton">
          Skip
        </button>
        <button type="button" class="ui-button ui-button-default ui-button-default-size" data-slot="button" data-variant="default" data-size="default">
          Continue
          <svg class="ml-2 size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>

<script src="../../_shared/chrome.js"></script>
<script src="../../_shared/inspector.js"></script>
</body>
</html>
