<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Onboarding · Account — DailyOS Reference</title>

<link rel="stylesheet" href="../../_shared/fonts.css">
<link rel="stylesheet" href="../../_shared/styles/design-tokens.css">
<link rel="stylesheet" href="../../_shared/styles/AtmosphereLayer.module.css">
<link rel="stylesheet" href="../../_shared/styles/FolioBar.module.css">
<link rel="stylesheet" href="../../_shared/styles/FloatingNavIsland.module.css">
<link rel="stylesheet" href="../../_shared/styles/onboarding.module.css">
<link rel="stylesheet" href="../../_shared/chrome.css">
<link rel="stylesheet" href="../../_shared/inspector.css">

<style>
  /* Onboarding wizard stand-in for the Tailwind primary Button.
     Mirrors src/components/ui/button.tsx size=lg variant=default:
     h-10 (40px) · px-6 (24px) · rounded-md · bg-primary · text-primary-foreground.
     Tokens from design-tokens.css; values match Tailwind theme.css mapping. */
  .ob-button-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    height: 40px;
    padding: 0 24px;
    border-radius: 6px;
    border: 0;
    background: var(--color-text-primary);
    color: var(--color-paper-cream);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .ob-button-primary:hover { opacity: 0.9; }
  .ob-button-primary svg { width: 16px; height: 16px; }
</style>
</head>
<body
  data-folio-label="Setup"
  data-folio-crumbs="Reference > Surfaces > Onboarding > Account"
  data-tint="turmeric"
  data-active-page=""
  data-nav-mode="chapters-only"
  data-active-chapter="first-account"
  data-chapters="welcome:sparkles:Welcome|google:mail:Google|claude-code:terminal:Claude|glean:globe:Glean|youcard:user:About You|first-account:building:Account|role:briefcase:Your Role|prime:sparkles:Prime">

<div class="onboarding_wrapper">
  <div class="onboarding_contentColumn">
    <div class="onboarding_flexCol onboarding_gap24">

      <!-- ChapterHeading -->
      <div style="margin-bottom: var(--space-xl);">
        <hr style="border: none; border-top: 1px solid var(--color-rule-heavy); margin: 0 0 var(--space-md);" />
        <div style="display: flex; align-items: center; gap: var(--space-sm);">
          <h2 style="margin: 0; font-family: var(--font-serif); font-size: 28px; font-weight: 400; line-height: 1.2; letter-spacing: -0.01em; color: var(--color-text-primary);">Your accounts</h2>
        </div>
        <p style="max-width: 540px; margin: var(--space-md) 0 0; font-family: var(--font-serif); font-size: 17px; font-style: italic; font-weight: 300; line-height: 1.55; color: var(--color-text-tertiary);">We found these accounts from your company tools. Select the ones you manage.</p>
      </div>

      <!-- Discovery results -->
      <div class="onboarding_ruleSection">
        <div class="onboarding_flexBetween onboarding_mb12">
          <div class="onboarding_sectionLabel">We found 4 accounts</div>
          <button class="onboarding_skipButton" type="button">Select all</button>
        </div>

        <div class="onboarding_flexCol onboarding_gap4">
          <label class="onboarding_discoveryRow">
            <input type="checkbox" checked style="accent-color: var(--color-text-primary);" />
            <span class="onboarding_bodyText">Acme Corp</span>
            <span class="onboarding_tertiaryText"> — Customer lead</span>
            <span class="onboarding_discoveryEvidence">Glean · acme.example.com</span>
          </label>
          <label class="onboarding_discoveryRow">
            <input type="checkbox" checked style="accent-color: var(--color-text-primary);" />
            <span class="onboarding_bodyText">Initech</span>
            <span class="onboarding_tertiaryText"> — Expansion contact</span>
            <span class="onboarding_discoveryEvidence">CRM · initech.example.com</span>
          </label>
          <label class="onboarding_discoveryRow">
            <input type="checkbox" checked style="accent-color: var(--color-text-primary);" />
            <span class="onboarding_bodyText">Example Manufacturing</span>
            <span class="onboarding_tertiaryText"> — Support sponsor</span>
            <span class="onboarding_discoveryEvidence">Docs · manufacturing.example.com</span>
          </label>
          <label class="onboarding_discoveryRow">
            <span class="onboarding_alreadyAddedBadge">Added</span>
            <span class="onboarding_bodyText">Pioneer Labs</span>
            <span class="onboarding_tertiaryText"> — Account owner</span>
            <span class="onboarding_discoveryEvidence">Calendar · pioneer.example.com</span>
          </label>
        </div>

        <!-- Import buttons -->
        <div class="onboarding_flexEnd onboarding_gap8 onboarding_mt12">
          <button
            type="button"
            style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--color-rule-heavy); background: var(--color-paper-warm-white); color: var(--color-text-primary); font-family: var(--font-sans); font-size: 14px; font-weight: 500; cursor: pointer;">
            Add All (3)
          </button>
          <button type="button" class="ob-button-primary">Add Selected (3)</button>
        </div>
      </div>

      <!-- Manual add — always available -->
      <div class="onboarding_ruleSection">
        <div class="onboarding_sectionLabel onboarding_mb8">
          Or add manually
        </div>

        <label class="onboarding_fieldLabel">
          Account name
        </label>
        <div class="onboarding_flexRow onboarding_gap8">
          <input
            type="text"
            placeholder="e.g. Acme Corp"
            value=""
            class="onboarding_editorialInput onboarding_flex1"
            style="height: 36px; width: 100%; min-width: 0; padding: 0 12px; font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); outline: none;" />
          <button
            type="button"
            aria-label="Add account"
            disabled
            style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--color-rule-heavy); background: var(--color-paper-warm-white); color: var(--color-text-primary); font-family: var(--font-sans); font-size: 14px; font-weight: 500; opacity: 0.5; cursor: not-allowed;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Add
          </button>
        </div>
      </div>

      <!-- Continue / Skip -->
      <div class="onboarding_flexBetween">
        <button class="onboarding_skipButton" type="button">
          Skip
        </button>
        <button type="button" class="ob-button-primary" disabled>
          Continue
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

    </div>
  </div>
</div>

<script src="../../_shared/chrome.js"></script>
<script src="../../_shared/inspector.js"></script>
</body>
</html>
