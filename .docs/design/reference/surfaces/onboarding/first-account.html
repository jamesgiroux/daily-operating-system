<body
  data-folio-label="Setup"
  data-folio-crumbs="Reference > Surfaces > Onboarding > Account"
  data-tint="turmeric"
  data-active-page=""
  data-nav-mode="chapters-only"
  data-active-chapter="first-account"
  data-chapters="welcome:sparkles:Welcome|google:mail:Google|claude-code:terminal:Claude|glean:globe:Glean|youcard:user:About You|first-account:building:Account|role:briefcase:Your Role|prime:sparkles:Prime">

<div class="onboarding_wrapper">
  <div class="onboarding_contentColumn">
    <div class="onboarding_flexCol onboarding_gap24">

      <!-- ChapterHeading: primary variant with epigraph -->
      <div class="ChapterHeading_heading">
        <hr class="ChapterHeading_rule">
        <div class="ChapterHeading_titleRow">
          <h2 class="ChapterHeading_title">Your accounts</h2>
        </div>
        <p class="ChapterHeading_epigraph">
          Add your customer accounts to get started. Briefings get smarter with context.
        </p>
      </div>

      <!-- Manual add: rest state without Glean discovery -->
      <div class="onboarding_ruleSection">
        <p class="onboarding_bodyText onboarding_mb16">
          Accounts track customer relationships, health, and context.
          When you meet with someone from an account, your briefing will
          include account history and recent updates.
        </p>

        <label class="onboarding_fieldLabel">
          Account name
        </label>
        <div class="onboarding_flexRow onboarding_gap8">
          <input
            type="text"
            data-slot="input"
            placeholder="e.g. Acme Corp"
            value=""
            class="file:text-foreground placeholder:text-muted-foreground selection:bg-primary selection:text-primary-foreground dark:bg-input/30 border-input h-9 w-full min-w-0 rounded-md border bg-transparent px-3 py-1 text-base shadow-xs transition-[color,box-shadow] outline-none file:inline-flex file:h-7 file:border-0 file:bg-transparent file:text-sm file:font-medium disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive onboarding_editorialInput onboarding_flex1"
            autofocus
          />
          <button type="button" class="ui-button ui-button-outline ui-button-sm" data-slot="button" data-variant="outline" data-size="sm" aria-label="Add account" disabled>
            <svg class="size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Add
          </button>
        </div>
      </div>

      <!-- Continue / Skip -->
      <div class="onboarding_flexBetween">
        <button class="onboarding_skipButton" type="button">
          Skip
        </button>
        <button type="button" class="ui-button ui-button-default ui-button-default-size" data-slot="button" data-variant="default" data-size="default" disabled>
          Continue
          <svg class="ml-2 size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>

      <!-- Conditional branch text retained for audit parity: Discovering accounts from your company tools... Added We found Select all Or add manually Add All ( Add Selected ( -->

    </div>
