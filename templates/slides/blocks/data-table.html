<!-- Set grid-template-columns on both header and rows to match your data -->
<section class="slide">
  <div class="overline">Data</div>
  <div class="data-table">
    <div class="data-table__header" style="grid-template-columns: 1fr 120px 100px 1fr;">
      <div class="data-table__header-cell">Name</div>
      <div class="data-table__header-cell">Value</div>
      <div class="data-table__header-cell">Trend</div>
      <div class="data-table__header-cell">Notes</div>
    </div>
    <div class="data-table__row" style="grid-template-columns: 1fr 120px 100px 1fr;">
      <div class="data-table__cell">Row item</div>
      <div class="data-table__cell data-table__cell--mono">$1.2M</div>
      <div class="data-table__cell trend--up">↑ 12%</div>
      <div class="data-table__cell data-table__cell--secondary">Supporting detail</div>
    </div>
    <div class="data-table__row" style="grid-template-columns: 1fr 120px 100px 1fr;">
      <div class="data-table__cell">Second row</div>
      <div class="data-table__cell data-table__cell--mono">$800K</div>
      <div class="data-table__cell trend--down">↓ 3%</div>
      <div class="data-table__cell data-table__cell--secondary">Another detail</div>
    </div>
  </div>
</section>
