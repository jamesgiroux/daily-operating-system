# CI strategy ():
# - lint-and-checks + frontend: every PR/push to dev/trunk on Linux (fast, cheap).
# - rust: moved to .github/workflows/rust.yml on macOS,
# triggered only when src-tauri/** or Cargo.* change,
# OR for any push/PR to trunk.
# - cargo-audit: moved to .github/workflows/security-audit.yml,
# weekly + path-triggered on Cargo.lock.
#
# Rationale: the .githooks/pre-commit gate runs clippy + cargo test --lib + tsc
# locally on every commit (post-), and L2 review is required before
# merge. Re-running clippy/cargo-test on every dev PR is redundant and burns
# macOS minutes (10x Linux cost).
name: Lint & Frontend

on:
  push:
    branches:
      - dev
      - trunk
    tags-ignore:
      - 'v*'
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'eslint.config.js'
      - 'stylelint.config.js'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/lint-frontend.yml'
  pull_request:
    branches:
      - dev
      - trunk
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'eslint.config.js'
      - 'stylelint.config.js'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'vitest.config.*'
      - '.github/workflows/lint-frontend.yml'

# Cancel superseded PR runs (force-push); never cancel main-branch landings.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts && bash src-tauri/scripts/build-mcp.sh --stub

      - name: Fail on committed OAuth secrets
        run: |
          if rg -n "GOCSPX-[A-Za-z0-9_-]+" --glob '!target/**' --glob '!node_modules/**' --glob '!.git/**' --glob '!_archive/**' .; then
            echo "Committed Google OAuth secret pattern detected."
            exit 1
          fi

      - name: Enforce service-layer mutation boundary
        run: ./scripts/check_service_layer_boundary.sh

      - name: Enforce write_intelligence_json fence usage
        run: ./scripts/check_write_fence_usage.sh

      - name: Enforce stakeholder graph writer signal helper
        run: ./scripts/check_stakeholder_writer_emits_signal.sh

      - name: Enforce DOS-589 dispatcher module boundaries
        run: ./scripts/check_version_dispatcher_boundaries.sh

      - name: Enforce ability surface drift guard
        run: |
          bash src-tauri/scripts/check_ability_surface_drift.sh
          bash src-tauri/scripts/check_no_live_external_clients_in_eval.sh
          bash src-tauri/scripts/check_fixture_anonymization.sh
          bash src-tauri/scripts/check_trust_factor_thresholds.sh
          bash scripts/check_prompt_template_registry.sh
          bash scripts/check_prompt_fingerprint_boundary.sh

      - name: Enforce durable source comments
        run: ./scripts/check_no_ephemeral_issue_refs_in_comments.sh

      - name: Enforce legacy semantic helper cutover
        run: ./scripts/check_no_legacy_semantic_helpers.sh

      - name: Enforce ability description PII + vocabulary lint
        run: ./scripts/check_ability_descriptions.sh

      - name: Enforce ability surface inventory matches live registry
        run: ./scripts/check_ability_inventory.sh

      - name: Enforce ADR-0130 substrate-owned composition authorship
        run: ./scripts/check_composition_authorship.sh

      - name: Enforce account overview surface claim loading
        run: ./scripts/check_account_overview_surface_loader.sh

      - name: Enforce must_use on DB mutation methods
        run: ./scripts/check_db_mutator_must_use.sh

      - name: Track legacy AI projection writers
        continue-on-error: true
        run: src-tauri/scripts/check_dos301_legacy_projection_writers.sh

      - name: TypeScript type-check
        run: pnpm tsc --noEmit

      - name: Lint (ESLint + Stylelint)
        run: pnpm lint

      - name: Reference fidelity audit
        run: python3 .docs/design/_audits/audit-reference.py --enforce-baseline

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts && bash src-tauri/scripts/build-mcp.sh --stub

      - name: Run frontend tests
        run: pnpm test
