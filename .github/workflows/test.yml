name: Test

on:
  push:
    branches:
      - trunk
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - trunk

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-v2-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Fail on committed OAuth secrets
        run: |
          if rg -n "GOCSPX-[A-Za-z0-9_-]+" --glob '!target/**' --glob '!node_modules/**' --glob '!.git/**' .; then
            echo "Committed Google OAuth secret pattern detected."
            exit 1
          fi

      - name: Create sidecar stub for Tauri externalBin validation
        run: |
          mkdir -p src-tauri/binaries
          TARGET=$(rustc -vV | awk '/^host:/ { print $2 }')
          touch "src-tauri/binaries/dailyos-mcp-$TARGET"
          # Force Cargo to re-run build.rs so it sees the stub binary
          touch src-tauri/build.rs

      - name: Enforce service-layer mutation boundary
        run: ./scripts/check_service_layer_boundary.sh

      - name: Enforce no-let-underscore on feedback/tombstone/file-write (DOS-309)
        run: ./scripts/check_no_let_underscore_feedback.sh

      - name: Enforce write_intelligence_json fence usage (DOS-311)
        run: ./scripts/check_write_fence_usage.sh

      - name: Enforce SubjectRef::Global spine restriction (DOS-310)
        run: ./scripts/check_no_global_subject_in_spine.sh

      - name: Run Rust clippy (production targets)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-features --lib --bins -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Install cargo-audit
        run: which cargo-audit || cargo install cargo-audit --locked

      - name: Run Rust dependency audit (high+)
        run: cargo audit --file audit.toml

      - name: Run frontend tests
        run: pnpm test

      - name: Run frontend dependency audit (high+)
        run: pnpm audit --audit-level high
