name: WP Plugin

on:
  push:
    branches:
      - dev
      - trunk
    paths:
      - 'wp/dailyos/**'
      - '.github/workflows/wp-plugin.yml'
  pull_request:
    branches:
      - dev
      - trunk
    paths:
      - 'wp/dailyos/**'
      - '.github/workflows/wp-plugin.yml'

defaults:
  run:
    working-directory: wp/dailyos

concurrency:
  group: wp-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-static:
    name: Lint, static analysis, audit, grep-gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: wp/dailyos/vendor
          key: composer-${{ runner.os }}-php8.4-${{ hashFiles('wp/dailyos/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHPCS (WordPress Coding Standards)
        run: ./vendor/bin/phpcs --report=checkstyle | cs2pr

      - name: PHPStan (static analysis, level 5)
        run: ./vendor/bin/phpstan analyze --no-progress --memory-limit=1G --error-format=github

      - name: Composer audit (CVE scan)
        run: composer audit --no-dev=false

      - name: Grep gates (secret-persistence + L0 invariants)
        run: bash scripts/run-grep-gates.sh

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: wp/dailyos/vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('wp/dailyos/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHPUnit
        run: ./vendor/bin/phpunit --no-coverage

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Run Plugin Check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: wp/dailyos
          # PHPCS-based checks already run in the lint-and-static job; this
          # focuses on directory-policy checks not covered by WPCS.
          exclude-checks: |
            late_escaping
            i18n_usage
          checks: |
            file_type
            performance
            accessibility
            plugin_review_phpcs
            trademarks
