name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CONF_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match tauri.conf.json version ($CONF_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-v2-

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Prevent keychain auto-lock during long Rust compilations
          security set-keychain-settings -t 3600 -u build.keychain

          # Add build.keychain to search list (codesign searches this, not just default)
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed -e 's/"//g')

          # Import certificate
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild \
            -T /usr/bin/productsign

          # Allow codesign to access keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Verify keychain is searchable
          echo "Keychain search list:"
          security list-keychains -d user

          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No Developer ID Application identity found"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Found signing identity: $IDENTITY"

          # Clean up
          rm certificate.p12

      - name: Prepare Apple notarization credentials
        env:
          APPLE_API_KEY_PATH_BASE64: ${{ secrets.APPLE_API_KEY_PATH_BASE64 }}
        run: |
          # Write the App Store Connect API .p8 key from base64 secret
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_PATH_BASE64" | base64 --decode > ~/private_keys/AuthKey.p8
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"
          echo "Notarization API key written to ~/private_keys/AuthKey.p8"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build MCP sidecar binary
        run: |
          bash src-tauri/scripts/build-mcp.sh aarch64-apple-darwin
          ls -la src-tauri/binaries/
          file src-tauri/binaries/dailyos-mcp-aarch64-apple-darwin
          # Force Cargo to re-run build.rs so it sees the new binary
          touch src-tauri/build.rs

      - name: Verify Google OAuth build secret
        env:
          DAILYOS_GOOGLE_SECRET: ${{ secrets.DAILYOS_GOOGLE_SECRET }}
        run: |
          if [ -z "$DAILYOS_GOOGLE_SECRET" ]; then
            echo "Missing DAILYOS_GOOGLE_SECRET. Set repo secret before building release artifacts."
            exit 1
          fi

      - name: Build Tauri app (macOS arm64, signed + notarized)
        timeout-minutes: 45
        env:
          DAILYOS_GOOGLE_SECRET: ${{ secrets.DAILYOS_GOOGLE_SECRET }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Collect artifacts
        id: artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          # DMG for fresh installs
          DMG_PATH=$(ls "$BUNDLE_DIR"/dmg/*.dmg)
          DMG_NAME=$(basename "$DMG_PATH")
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

          # Updater artifacts (.tar.gz and .tar.gz.sig)
          TARBALL_PATH=$(ls "$BUNDLE_DIR"/macos/*.tar.gz | grep -v '.sig$')
          TARBALL_NAME=$(basename "$TARBALL_PATH")
          SIG_PATH="${TARBALL_PATH}.sig"
          echo "tarball_path=$TARBALL_PATH" >> "$GITHUB_OUTPUT"
          echo "tarball_name=$TARBALL_NAME" >> "$GITHUB_OUTPUT"
          echo "sig_path=$SIG_PATH" >> "$GITHUB_OUTPUT"

          # Signature is multiline (Minisign format) — use heredoc for GITHUB_OUTPUT
          # printf '\n' ensures a trailing newline before the delimiter
          echo "sig_content<<SIG_EOF" >> "$GITHUB_OUTPUT"
          cat "$SIG_PATH" >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"
          echo "SIG_EOF" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract the section for this version from release-notes.md
          # Matches from "## vX.Y.Z" heading to the next "---" separator (or EOF)
          awk -v ver="## v${VERSION}" '
            $0 ~ ver { found=1; next }
            found && /^---$/ { exit }
            found { print }
          ' release-notes.md | sed -e 's/^[[:space:]]*//' -e '/^$/N;/^\n$/d' > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "WARNING: No release notes found for v${VERSION} in release-notes.md"
            echo "DailyOS v${VERSION}" > /tmp/release_notes.md
          fi

          # Build the full GitHub Release body (notes + install instructions)
          DMG_NAME="${{ steps.artifacts.outputs.dmg_name }}"
          cat /tmp/release_notes.md > /tmp/release_body.md
          printf '\n---\n\n## Installation\n\n**New users:**\n1. Download the DMG from this release\n2. Drag DailyOS to Applications\n3. Open DailyOS — the app is signed and notarized, no workarounds needed\n\n**Existing users:** DailyOS will update automatically. Check Settings for details.\n' >> /tmp/release_body.md

          echo "Release notes extracted:"
          cat /tmp/release_notes.md

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TARBALL_NAME="${{ steps.artifacts.outputs.tarball_name }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          SIG_PATH="${{ steps.artifacts.outputs.sig_path }}"

          # Build latest.json with jq for safe JSON construction
          # Release notes read from file to avoid shell injection
          jq -n \
            --arg version "$VERSION" \
            --rawfile notes /tmp/release_notes.md \
            --arg pub_date "$PUB_DATE" \
            --arg url "$REPO_URL/releases/download/${{ github.ref_name }}/$TARBALL_NAME" \
            --arg sig "$(cat "$SIG_PATH")" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: DailyOS ${{ github.ref_name }}
          body_path: /tmp/release_body.md
          files: |
            ${{ steps.artifacts.outputs.dmg_path }}
            ${{ steps.artifacts.outputs.tarball_path }}
            ${{ steps.artifacts.outputs.sig_path }}
            latest.json
          draft: false
          prerelease: false

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f ~/private_keys/AuthKey.p8 2>/dev/null || true
